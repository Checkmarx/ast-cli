name: Issue automation

on:
  issues:
    types: [opened, closed]

jobs:
  notify_jira:
    if: github.event.action == 'opened'
    name: Notify Jira
    uses: Checkmarx/plugins-release-workflow/.github/workflows/jira_notify.yml@main
    with:
      title: ${{ github.event.issue.title }}
      body: ${{ github.event.issue.body }}
      html_url: ${{ github.event.issue.html_url }}
      repo: ${{ github.event.repository.full_name }}
    secrets:
      AST_JIRA_API_TOKEN: ${{ secrets.AST_JIRA_API_TOKEN }}
      AST_JIRA_USER_EMAIL: ${{ secrets.AST_JIRA_USER_EMAIL }}
      JIRA_FIELDS_BUG: ${{ secrets.JIRA_FIELDS_BUG }}
      JIRA_FIELDS_OTHER: ${{ secrets.JIRA_FIELDS_OTHER }}

  close_jira:
    if: github.event.action == 'closed'
    name: Close Jira
    uses: Checkmarx/plugins-release-workflow/.github/workflows/jira_close.yml@main
    with:
      issue_number: ${{ github.event.issue.number }}
      repo: ${{ github.event.repository.full_name }}
    secrets:
      AST_JIRA_API_TOKEN: ${{ secrets.AST_JIRA_API_TOKEN }}
      AST_JIRA_USER_EMAIL: ${{ secrets.AST_JIRA_USER_EMAIL }}
